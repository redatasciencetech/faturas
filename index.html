<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faturas</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f4f6f8;
}

/* SELETOR DE EMPRESAS (NOVO) */
.seletor-empresas {
  background: white;
  padding: 20px;
  display: flex;
  gap: 20px;
  align-items: center;
  justify-content: center;
  border-bottom: 2px solid #ddd;
}

.logo-empresa {
  height: 60px;
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 8px;
  transition: 0.2s;
}

.logo-empresa:hover {
  border-color: #0d2bd7;
  transform: scale(1.05);
}

.btn-todas {
  padding: 10px 20px;
  background: #555;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* HEADER */
.topo {
  background: linear-gradient(90deg, black, goldenrod);
  color: white;
  padding: 30px;
  border-radius: 15px;
  margin: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topo h1 {
  font-size: 28px;
}

/* RESUMO */
.resumo {
  margin-top: 10px;
  font-size: 15px;
}

/* CARDS */
.container {
  padding: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
}

.card {
  background: #eaecef;
  border-radius: 20px;
  overflow: hidden;
  text-align: center;
}

.card-header {
  background: #ff5a5a;
  color: white;
  padding: 15px;
  font-weight: bold;
}

.card-body {
  padding: 20px;
}

.status {
  font-weight: bold;
  margin-bottom: 10px;
}

.valor {
  font-size: 26px;
  color: #0d2bd7;
  margin-bottom: 10px;
}

.info {
  font-size: 13px;
  color: #555;
  margin-bottom: 15px;
}

.pix-box {
  border: 2px solid #0d2bd7;
  border-radius: 15px;
  padding: 10px;
  margin-bottom: 15px;
}

.pix-box button {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  margin-top: 5px;
  cursor: pointer;
}

.btn-qr {
  background: #22c1a6;
  color: white;
}

.btn-copiar {
  background: white;
  border: 1px solid #0d2bd7;
}

.btn-final {
  background: #0d2bd7;
  color: white;
  padding: 12px;
  border-radius: 25px;
  border: none;
  width: 80%;
  margin: 10px auto 20px;
  display: block;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  width: 300px;
  margin: 10% auto;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  position: relative;
}

.fechar {
  position: absolute;
  right: 15px;
  top: 10px;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

    
<img src="cabecalho.png" width="100%" height="100%" style="display: block; margin: 20px auto;" alt="Cabeçalho">

<div class="seletor-empresas">
  <img src="aguasdopara-logo.png" onclick="filtrarFaturas('aguas')" class="logo-empresa" alt="Águas do Pará">
  
  <img src="equatorial-logo.png" onclick="filtrarFaturas('equatorial')" class="logo-empresa" alt="Equatorial">
  
  <button onclick="filtrarFaturas('todas')" class="btn-todas">Ver Todas</button>
</div>





<div class="topo">
  <div>
    <h1>Faturas em aberto</h1>
    <p id="resumo" class="resumo"></p>
  </div>
</div>

<div class="container">
  <div id="cards" class="cards"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="fechar" onclick="fecharModal()">×</span>
    <h2>Pagamento PIX</h2>
    <img id="qrImg" src="" />
  </div>
</div>

<script>
// 🔹 DADOS ATUALIZADOS: Agora cada fatura tem uma "empresa"
const boletos = [
  { empresa: "aguas", mes: "NOVEMBRO/25", valor: 50.31, vencimento: "08/12/2025" },
  { empresa: "equatorial", mes: "JANEIRO/26", valor: 50.21, vencimento: "08/02/2026" },
  { empresa: "aguas", mes: "FEVEREIRO/26", valor: 49.10, vencimento: "07/03/2026" },
  { empresa: "equatorial", mes: "MARÇO/26", valor: 49.10, vencimento: "15/04/2026" },
  { empresa: "equatorial", mes: "ABRIL/26", valor: 55.00, vencimento: "25/05/2026" } 
];

// 🔹 FUNÇÃO PRINCIPAL: Recebe uma lista de faturas e desenha na tela
function renderizarFaturas(listaDeFaturas) {
  const container = document.getElementById("cards");
  container.innerHTML = ""; // Limpa a tela antes de desenhar os novos cards

  // Calcula o resumo com base na lista que foi passada
  const quantidade = listaDeFaturas.length;
  const total = listaDeFaturas.reduce((soma, b) => soma + b.valor, 0);
  const totalFormatado = total.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

  document.getElementById("resumo").innerHTML =
    `Você possui <b>${quantidade} faturas</b> em aberto para pagamento, totalizando <b>${totalFormatado}</b>`;

  // Se não tiver nenhuma fatura (ex: filtrou uma empresa e não achou nada)
  if (quantidade === 0) {
    container.innerHTML = "<p>Nenhuma fatura encontrada para esta empresa.</p>";
    return;
  }

  // Desenha os cards
  listaDeFaturas.forEach((b, index) => {
    const [dia, mes, ano] = b.vencimento.split('/');
    const dataVencimento = new Date(ano, mes - 1, dia);
    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);

    let textoStatus = "✅ EM ABERTO";
    let corStatus = "#22c1a6";
    let corCardHeader = "#22c1a6"; // Header verde para em aberto
    
    if (dataVencimento < hoje) {
      textoStatus = "❌ ATRASADA";
      corStatus = "#ff5a5a";
      corCardHeader = "#ff5a5a"; // Header vermelho para atrasada
    }

    const valorFormatado = b.valor.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    const codigoPix = "PIX" + index + b.empresa + "123"; // Código PIX dinâmico

    container.innerHTML += `
      <div class="card">
        <div class="card-header" style="background-color: ${corCardHeader}">${b.mes} - ${b.empresa.toUpperCase()}</div>
        <div class="card-body">
          <div class="status" style="color: ${corStatus}">${textoStatus}</div>
          <div class="valor">${valorFormatado}</div>
          <div class="info">
            Consumo: 10 m³<br>
            Vencimento: ${b.vencimento}
          </div>

          <div class="pix-box">
            <p>Pague com PIX</p>
            <button class="btn-qr" onclick="abrirModal('${codigoPix}')">ABRIR QR CODE</button>
            <button class="btn-copiar" onclick="copiar('${codigoPix}')">COPIAR</button>
          </div>

          <button class="btn-final">EMITIR 2ª VIA</button>
        </div>
      </div>
    `;
  });
}

// 🔹 FUNÇÃO DE FILTRO (Chamada quando clica na imagem)
function filtrarFaturas(nomeDaEmpresa) {
  if (nomeDaEmpresa === 'todas') {
    // Se clicou em "Ver Todas", manda o array completo
    renderizarFaturas(boletos);
  } else {
    // Cria um novo array apenas com as faturas da empresa clicada
    const faturasFiltradas = boletos.filter(fatura => fatura.empresa === nomeDaEmpresa);
    // Manda esse novo array para ser desenhado na tela
    renderizarFaturas(faturasFiltradas);
  }
}

// 🔹 INICIALIZAÇÃO: Desenha todas as faturas assim que a página carrega
renderizarFaturas(boletos);

// 🔹 FUNÇÕES DO MODAL E PIX
function abrirModal(codigoPix) {
  document.getElementById("qrImg").src =
    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${codigoPix}`;
  document.getElementById("modal").style.display = "block";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

function copiar(codigoPix) {
  navigator.clipboard.writeText(codigoPix);
  alert("Código copiado: " + codigoPix);
}

window.onclick = function(e) {
  if (e.target.id === "modal") {
    fecharModal();
  }
}
</script>

</body>
</html>
